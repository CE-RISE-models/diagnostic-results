# Enumerations
enums:
    DiagnosticEventTypeEnum:
        description: Types of diagnostic activities
        permissible_values:
            SERVICE:
                description: Service or maintenance diagnostic
            SELF_TEST:
                description: Automated self-diagnostic test
            PREDICTIVE:
                description: Predictive maintenance analysis
            CALIBRATION:
                description: Calibration verification
            INSPECTION:
                description: Quality inspection or audit
            REFURBISHMENT:
                description: Refurbishment assessment

    DiagnosticEventTriggerEnum:
        description: What triggered the diagnostic event
        permissible_values:
            SCHEDULED:
                description: Regularly scheduled diagnostic
            FAILURE:
                description: Triggered by failure or malfunction
            REQUEST:
                description: Manual request for diagnostic
            QUALITY_CHECK:
                description: Quality control check
            INTAKE:
                description: Initial intake assessment
            ALERT:
                description: Triggered by alert or threshold

    DiagnosticTestEnvironmentEnum:
        description: Type of test environment
        permissible_values:
            LAB:
                description: Laboratory environment
            FIELD:
                description: Field or on-site location
            FACTORY:
                description: Manufacturing facility
            CUSTOMER_SITE:
                description: Customer location
            SERVICE_CENTER:
                description: Service or repair center
            REMOTE:
                description: Remote diagnostic

    DiagnosticConfidenceLevelEnum:
        description: Confidence level in results
        permissible_values:
            HIGH:
                description: High confidence in results
            MEDIUM:
                description: Medium confidence in results
            LOW:
                description: Low confidence in results
            UNKNOWN:
                description: Confidence level unknown

    DiagnosticComponentTypeEnum:
        description: Functional component types commonly discovered during diagnostics
        permissible_values:
            PROCESSOR:
                description: Processor or computing unit
            MEMORY:
                description: Memory component
            STORAGE:
                description: Storage component
            SENSOR:
                description: Sensor or measurement element
            ACTUATOR:
                description: Actuator or motion/control element
            MODULE:
                description: Functional module
            ASSEMBLY:
                description: Assembly made of multiple components
            POWER:
                description: Power supply, battery, charger, or power-management component
            COMMUNICATION:
                description: Communication or connectivity component
            DISPLAY:
                description: Display or visual output component
            CONNECTOR:
                description: Connector, port, cable, or interface
            OTHER:
                description: Other component type

    DiagnosticComponentCategoryEnum:
        description: High-level component categories
        permissible_values:
            HARDWARE:
                description: Hardware component
            SOFTWARE:
                description: Software component
            FIRMWARE:
