id: https://ce-rise-models.codeberg.page/diagnostic-results/
name: diagnostic-results
title: Diagnostic Results Data Model
description: Structured outputs from diagnostic, repair, service, and condition-assessment operations
license: https://creativecommons.org/licenses/by-nc/4.0/
version: 0.1.1

prefixes:
    linkml: https://w3id.org/linkml/
    diag: https://ce-rise-models.codeberg.page/diagnostic-results/
    schema: http://schema.org/
    iso: https://www.iso.org/
    dcterms: http://purl.org/dc/terms/
    qudt: http://qudt.org/schema/qudt/
    sosa: http://www.w3.org/ns/sosa/
    ssn: http://www.w3.org/ns/ssn/
    prov: http://www.w3.org/ns/prov#
    foaf: http://xmlns.com/foaf/0.1/
    org: http://www.w3.org/ns/org#
    vcard: http://www.w3.org/2006/vcard/ns#
    geo: http://www.w3.org/2003/01/geo/wgs84_pos#
    uq: https://ce-rise-models.codeberg.page/uncertainty-quantification/
    mt: https://ce-rise-models.codeberg.page/metrological-traceability/
    dqf: https://ce-rise-models.codeberg.page/data-quality-framework/

imports:
    - linkml:types
    - https://codeberg.org/CE-RISE-models/uncertainty-quantification/raw/tag/pages-v0.0.3/generated/schema
    - https://codeberg.org/CE-RISE-models/metrological-traceability/raw/tag/pages-v0.0.3/generated/schema
    - https://codeberg.org/CE-RISE-models/data-quality-framework/raw/tag/pages-v0.0.3/generated/schema

default_range: string

# Root class
classes:
    DiagnosticResults:
        description: Root container for all diagnostic results and assessments
        tree_root: true
        attributes:
            diagnostic_event:
                range: DiagnosticEvent
                description: Foundation diagnostic event with context
                multivalued: true
            component_inventory:
                range: ComponentInventory
                description: Components discovered during diagnostic
                multivalued: true
                annotations:
                    references: "Jensen et al.; King et al.; CIRPASS"
            component_test_results:
                range: ComponentTestResults
                description: Test results for components
                multivalued: true
                annotations:
                    references: "CIRPASS; Battery Pass"
            condition_metrics:
                range: ConditionMetrics
                description: Health and condition measurements
                multivalued: true
            data_sanitization:
                range: DataSanitization
                description: Data erasure and sanitization records
                multivalued: true
            quality_assessment:
                range: QualityAssessment
                description: Quality grading and assessment
                multivalued: true
            service_actions:
                range: ServiceActions
                description: Service and repair actions performed
                multivalued: true
            predictive_analytics:
                range: PredictiveAnalytics
                description: Predictive maintenance outputs
                multivalued: true
            software_versions:
                range: SoftwareVersionRecord
                description: Firmware, BIOS, OS, and driver version records of the product being diagnosed
                multivalued: true
                annotations:
                    references: "CIRPASS"

    DiagnosticEvent:
        description: Foundation for all diagnostic activities with complete context
        attributes:
            event_identifier:
                range: string
                description: Unique identifier for diagnostic event UUID format
                annotations:
                    sql_identifier: diag_event_id
                    owl.filler: dcterms:identifier
                pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"

            event_identifier_value:
                range: string
                description: Value holder for event identifier

            event_timestamp:
                range: datetime
                description: When diagnostic occurred ISO 8601 with timezone
                annotations:
                    sql_identifier: diag_event_timestamp
                    owl.filler: prov:generatedAtTime
                    references: "CIRPASS"

            event_timestamp_value:
                range: string
                description: Value holder for event timestamp

            diagnostic_type:
                range: string
                description: Classification SERVICE SELF_TEST PREDICTIVE CALIBRATION INSPECTION
                annotations:
                    sql_identifier: diag_event_type
                    owl.filler: dcterms:type

            diagnostic_type_value:
                range: string
                description: Value holder for diagnostic type

            performed_by:
                range: string
                description: Who or what performed diagnostic - technician ID system ID software
                annotations:
                    sql_identifier: diag_event_performed_by
                    owl.filler: prov:wasAssociatedWith
                    references: "Berger et al."

            performed_by_value:
                range: string
                description: Value holder for performed by

            product_reference:
                range: string
                description: Link to product-profile identifiers GTIN plus serial
                annotations:
                    sql_identifier: diag_event_product_ref
                    owl.filler: dcterms:references
                pattern: "^([0-9]{14}:[A-Za-z0-9-]+|urn:epc:id:).*"

            product_reference_value:
                range: string
                description: Value holder for product reference

            location_reference:
                range: string
                description: Where performed facility GLN service center field location
                annotations:
                    sql_identifier: diag_event_location
                    owl.filler: geo:location
                    references: "Jensen et al.; CIRPASS"
                pattern: "^([0-9]{13}|[A-Z]{2}[A-Z0-9]{3}).*"

            location_reference_value:
                range: string
                description: Value holder for location reference

            event_trigger:
                range: string
                description: What initiated diagnostic SCHEDULED FAILURE REQUEST QUALITY_CHECK INTAKE
                annotations:
                    sql_identifier: diag_event_trigger
                    owl.filler: prov:wasStartedBy

            event_trigger_value:
                range: string
                description: Value holder for event trigger

            unit_identifier:
                range: string
                description: Internal tracking ID for specific unit
                annotations:
                    sql_identifier: diag_event_unit_id
                    owl.filler: dcterms:identifier

            unit_identifier_value:
                range: string
                description: Value holder for unit identifier

            batch_identifier:
                range: string
                description: Batch or lot reference for grouped processing
                annotations:
                    sql_identifier: diag_event_batch_id
                    owl.filler: schema:productionDate

            batch_identifier_value:
                range: string
                description: Value holder for batch identifier

            asset_reference:
                range: string
                description: Asset management tag for enterprise tracking
                annotations:
                    sql_identifier: diag_event_asset_ref
                    owl.filler: schema:identifier

            asset_reference_value:
                range: string
                description: Value holder for asset reference

            diagnostic_software:
                range: DiagnosticSoftware
                description: Software or tool used for diagnostic

            environmental_conditions:
                range: EnvironmentalConditions
                description: Environmental parameters during testing

            session_metadata:
                range: SessionMetadata
                description: Diagnostic session tracking information

            quality_metadata:
                range: QualityMetadata
                description: Result quality and confidence indicators

    DiagnosticSoftware:
        description: Information about diagnostic software or tool used
        attributes:
            tool_name:
                range: string
                description: Name of diagnostic software or tool
                annotations:
                    sql_identifier: diag_software_name
                    owl.filler: schema:name

            tool_name_value:
                range: string
                description: Value holder for tool name

            tool_version:
                range: string
                description: Version of diagnostic software critical for reproducibility
                annotations:
                    sql_identifier: diag_software_version
                    owl.filler: schema:version

            tool_version_value:
                range: string
                description: Value holder for tool version

            tool_vendor:
                range: string
                description: Vendor or manufacturer of diagnostic tool
                annotations:
                    sql_identifier: diag_software_vendor
                    owl.filler: schema:manufacturer

            tool_vendor_value:
                range: string
                description: Value holder for tool vendor

            tool_certification:
                range: string
                description: Certification status if validated or certified tool
                annotations:
                    sql_identifier: diag_software_cert
                    owl.filler: schema:certification
                    references: "King et al."

            tool_certification_value:
                range: string
                description: Value holder for tool certification

            tool_configuration:
                range: string
                description: Configuration settings used during diagnostic
                annotations:
                    sql_identifier: diag_software_config
                    owl.filler: schema:softwareRequirements

            tool_configuration_value:
                range: string
                description: Value holder for tool configuration

    EnvironmentalConditions:
        description: Environmental parameters during diagnostic testing
        attributes:
            ambient_temperature:
                range: float
                description: Temperature during testing in Celsius
                annotations:
                    sql_identifier: diag_env_temperature
                    owl.filler: qudt:temperature
                    unit: degreeCelsius
                    references: "Jensen et al."

            ambient_temperature_value:
                range: string
                description: Value holder for ambient temperature

            humidity:
                range: float
                description: Relative humidity percentage during testing
                annotations:
                    sql_identifier: diag_env_humidity
                    owl.filler: qudt:relativeHumidity
                    unit: percent
                minimum_value: 0.0
                maximum_value: 100.0

            humidity_value:
                range: string
                description: Value holder for humidity

            pressure:
                range: float
                description: Atmospheric pressure in kPa
                annotations:
                    sql_identifier: diag_env_pressure
                    owl.filler: qudt:pressure
                    unit: kilopascal

            pressure_value:
                range: string
                description: Value holder for pressure

            test_environment:
                range: string
                description: Test environment type LAB FIELD FACTORY CUSTOMER_SITE
                annotations:
                    sql_identifier: diag_env_location_type
                    owl.filler: prov:atLocation
                    references: "Jensen et al."

            test_environment_value:
                range: string
                description: Value holder for test environment

            other_conditions:
                range: string
                description: Other relevant environmental conditions
                annotations:
                    sql_identifier: diag_env_other
                    owl.filler: dcterms:description

            other_conditions_value:
                range: string
                description: Value holder for other conditions

    SessionMetadata:
        description: Diagnostic session tracking and completeness
        attributes:
            session_duration:
                range: string
                description: Total session duration ISO 8601 format
                annotations:
                    sql_identifier: diag_session_duration
                    owl.filler: dcterms:extent
                pattern: "^P(?:\\d+Y)?(?:\\d+M)?(?:\\d+W)?(?:\\d+D)?(?:T(?:\\d+H)?(?:\\d+M)?(?:\\d+(?:\\.\\d+)?S)?)?$"

            session_duration_value:
                range: string
                description: Value holder for session duration

            test_sequence:
                range: string
                description: Order in which tests were performed
                annotations:
                    sql_identifier: diag_session_sequence
                    owl.filler: prov:qualifiedAssociation

            test_sequence_value:
                range: string
                description: Value holder for test sequence

            tests_completed:
                range: integer
                description: Number of tests successfully completed
                annotations:
                    sql_identifier: diag_session_completed
                    owl.filler: schema:numberOfItems

            tests_completed_value:
                range: string
                description: Value holder for tests completed

            tests_aborted:
                range: integer
                description: Number of tests aborted or failed to complete
                annotations:
                    sql_identifier: diag_session_aborted
                    owl.filler: schema:numberOfItems

            tests_aborted_value:
                range: string
                description: Value holder for tests aborted

            abort_reasons:
                range: string
                description: Reasons for test abortions
                annotations:
                    sql_identifier: diag_session_abort_reasons
                    owl.filler: dcterms:description

            abort_reasons_value:
                range: string
                description: Value holder for abort reasons

    QualityMetadata:
        description: Result quality and confidence indicators
        attributes:
            data_completeness:
                range: float
                description: Percentage of tests completed 0 to 100
                annotations:
                    sql_identifier: diag_quality_completeness
                    owl.filler: schema:ratingValue
                    unit: percent
                    references: "King et al."
                minimum_value: 0.0
                maximum_value: 100.0

            data_completeness_value:
                range: string
                description: Value holder for data completeness

            result_confidence:
                range: string
                description: Confidence level HIGH MEDIUM LOW
                annotations:
                    sql_identifier: diag_quality_confidence
                    owl.filler: schema:confidenceScore

            result_confidence_value:
                range: string
                description: Value holder for result confidence

            anomalies_detected:
                range: string
                description: Description of any anomalies detected during diagnostic
                annotations:
                    sql_identifier: diag_quality_anomalies
                    owl.filler: sosa:hasResult

            anomalies_detected_value:
                range: string
                description: Value holder for anomalies detected

    ComponentInventory:
        description: Components, sub-components, and configuration items discovered or documented during a diagnostic event
        class_uri: ssn:System
        attributes:
            component_identifier:
                range: string
                description: Unique identifier for the discovered component or configuration item
                annotations:
                    sql_identifier: diag_component_id
                    owl.filler: dcterms:identifier
                    references: "Jensen et al.; King et al.; CIRPASS"
                pattern: "^[A-Za-z0-9._:-]+$"

            component_identifier_value:
                range: string
                description: Value holder for component identifier

            component_type:
                range: DiagnosticComponentTypeEnum
                description: Functional type of component
                annotations:
                    sql_identifier: diag_component_type
                    owl.filler: dcterms:type

            component_type_value:
                range: string
                description: Value holder for component type

            component_category:
                range: DiagnosticComponentCategoryEnum
                description: Higher-level component category
                annotations:
                    sql_identifier: diag_component_category
                    owl.filler: schema:category

            component_category_value:
                range: string
                description: Value holder for component category

            component_name:
                range: string
                description: Human-readable component name
                annotations:
                    sql_identifier: diag_component_name
                    owl.filler: schema:name

            component_name_value:
                range: string
                description: Value holder for component name

            component_manufacturer:
                range: string
                description: Component manufacturer name or organization identifier
                annotations:
                    sql_identifier: diag_component_manufacturer
                    owl.filler: schema:manufacturer

            component_manufacturer_value:
                range: string
                description: Value holder for component manufacturer

            component_model:
                range: string
                description: Component model designation
                annotations:
                    sql_identifier: diag_component_model
                    owl.filler: schema:model

            component_model_value:
                range: string
                description: Value holder for component model

            component_part_number:
                range: string
                description: Manufacturer or operator part number
                annotations:
                    sql_identifier: diag_component_part_number
                    owl.filler: schema:productID

            component_part_number_value:
                range: string
                description: Value holder for component part number

            component_serial_number:
                range: string
                description: Component serial number
                annotations:
                    sql_identifier: diag_component_serial_number
                    owl.filler: schema:serialNumber

            component_serial_number_value:
                range: string
                description: Value holder for component serial number

            component_version_revision:
                range: string
                description: Hardware, software, firmware, or configuration revision
                annotations:
                    sql_identifier: diag_component_version_revision
                    owl.filler: schema:version

            component_version_revision_value:
                range: string
                description: Value holder for component version or revision

            component_firmware_version:
                range: string
                description: Firmware version when applicable
                annotations:
                    sql_identifier: diag_component_firmware_version
                    owl.filler: schema:softwareVersion

            component_firmware_version_value:
                range: string
                description: Value holder for component firmware version

            component_status:
                range: DiagnosticComponentStatusEnum
                description: Presence and operational status detected during diagnostics
                annotations:
                    sql_identifier: diag_component_status
                    owl.filler: sosa:hasResult

            component_status_value:
                range: string
                description: Value holder for component status

            component_specifications:
                range: ComponentSpecification
                description: Flexible key-value specifications associated with this component
                multivalued: true
                inlined: true
                inlined_as_list: true

            component_hierarchy:
                range: ComponentHierarchy
                description: Parent-child placement of this component in the product or assembly hierarchy
                inlined: true

            sub_components:
                range: ComponentInventory
                description: Nested sub-components discovered below this component
                multivalued: true
                inlined: true
                inlined_as_list: true

            component_discovery_method:
                range: string
                description: Method, interface, or procedure used to discover the component
                annotations:
                    sql_identifier: diag_component_discovery_method
                    owl.filler: sosa:usedProcedure

            component_discovery_method_value:
                range: string
                description: Value holder for component discovery method

            component_discovery_timestamp:
                range: datetime
                description: Timestamp when the component was discovered or recorded
                annotations:
                    sql_identifier: diag_component_discovery_timestamp
                    owl.filler: prov:generatedAtTime

            component_discovery_timestamp_value:
                range: string
                description: Value holder for component discovery timestamp

    ComponentSpecification:
        description: Name-value component specification with optional unit and source reference
        class_uri: schema:PropertyValue
        attributes:
            component_specification_name:
                range: string
                description: Name of the specification parameter
                annotations:
                    sql_identifier: diag_component_spec_name
                    owl.filler: schema:name

            component_specification_name_value:
                range: string
                description: Value holder for component specification name

            component_specification_value:
                range: string
                description: Specification value as reported by the diagnostic source
                annotations:
                    sql_identifier: diag_component_spec_value
                    owl.filler: schema:value

            component_specification_value_value:
                range: string
                description: Value holder for component specification value

            component_specification_unit:
                range: string
                description: Unit of measurement for the specification value
                annotations:
                    sql_identifier: diag_component_spec_unit
                    owl.filler: qudt:unit

            component_specification_unit_value:
                range: string
                description: Value holder for component specification unit

            component_specification_source:
                range: uri
                description: URI reference to the source specification, datasheet, standard, or diagnostic report
                annotations:
                    sql_identifier: diag_component_spec_source
                    owl.filler: dcterms:source

            component_specification_source_value:
                range: string
                description: Value holder for component specification source

    ComponentHierarchy:
        description: Parent-child relationship and assembly position for a component
        attributes:
            parent_component_identifier:
                range: string
                description: Identifier of the parent component or assembly
                annotations:
                    sql_identifier: diag_component_parent_id
                    owl.filler: dcterms:references

            parent_component_identifier_value:
                range: string
                description: Value holder for parent component identifier

            hierarchy_level:
                range: integer
                description: Hierarchy level where 0 denotes the root product or top-level assembly
                annotations:
                    sql_identifier: diag_component_hierarchy_level
                    owl.filler: schema:position
                minimum_value: 0

            hierarchy_level_value:
                range: string
                description: Value holder for hierarchy level

            assembly_position:
                range: string
                description: Physical or logical position in the parent assembly
                annotations:
                    sql_identifier: diag_component_assembly_position
                    owl.filler: schema:position

            assembly_position_value:
                range: string
                description: Value holder for assembly position

            component_relationship_type:
                range: DiagnosticComponentRelationshipEnum
                description: Type of parent-child relationship
                annotations:
                    sql_identifier: diag_component_relationship_type
                    owl.filler: dcterms:type

            component_relationship_type_value:
                range: string
                description: Value holder for component relationship type

    ComponentTestResults:
        description: Generic component testing outcomes, measurements, standards, comparisons, and calibration references
        class_uri: sosa:Observation
        attributes:
            test_identifier:
                range: string
                description: Unique identifier for the component test or test batch
                annotations:
                    sql_identifier: diag_test_id
                    owl.filler: dcterms:identifier
                    references: "CIRPASS; Battery Pass"
                pattern: "^[A-Za-z0-9._:-]+$"

            test_identifier_value:
                range: string
                description: Value holder for test identifier

            test_timestamp:
                range: datetime
                description: Timestamp when the test was executed or completed
                annotations:
                    sql_identifier: diag_test_timestamp
                    owl.filler: prov:generatedAtTime

            test_timestamp_value:
                range: string
                description: Value holder for test timestamp

            test_component_reference:
                range: string
                description: Reference to the tested component identifier
                annotations:
                    sql_identifier: diag_test_component_ref
                    owl.filler: sosa:hasFeatureOfInterest

            test_component_reference_value:
                range: string
                description: Value holder for test component reference

            test_type:
                range: DiagnosticTestTypeEnum
                description: Type of test performed
                annotations:
                    sql_identifier: diag_test_type
                    owl.filler: dcterms:type

            test_type_value:
                range: string
                description: Value holder for test type

            test_name:
                range: string
                description: Specific test name
                annotations:
                    sql_identifier: diag_test_name
                    owl.filler: schema:name

            test_name_value:
                range: string
                description: Value holder for test name

            test_result:
                range: DiagnosticTestResultEnum
                description: Test outcome classification
                annotations:
                    sql_identifier: diag_test_result
                    owl.filler: sosa:hasResult

            test_result_value:
                range: string
                description: Value holder for test result

            measured_values:
                range: MeasuredValue
                description: Measured values produced by the test
                multivalued: true
                inlined: true
                inlined_as_list: true

            reference_values:
                range: ReferenceValue
                description: Expected, nominal, threshold, or baseline values used for interpretation
                multivalued: true
                inlined: true
                inlined_as_list: true

            test_standard:
                range: uri
                description: URI reference to the applicable test standard
                multivalued: true
                annotations:
                    sql_identifier: diag_test_standard
                    owl.filler: dcterms:conformsTo
                    references: "ISO 13374; MIMOSA OSA-CBM; IEC 61508; IEEE standards"

            test_standard_value:
                range: string
                description: Value holder for test standard

            test_protocol_reference:
                range: uri
                description: URI reference to the test protocol or work instruction
                annotations:
                    sql_identifier: diag_test_protocol_ref
                    owl.filler: sosa:usedProcedure

            test_protocol_reference_value:
                range: string
                description: Value holder for test protocol reference

            compliance_standard:
                range: string
                description: Compliance standard or requirement assessed by the test
                annotations:
                    sql_identifier: diag_test_compliance_standard
                    owl.filler: dcterms:conformsTo

            compliance_standard_value:
                range: string
                description: Value holder for compliance standard

            test_parameters:
                range: TestParameter
                description: Parameter settings used during test execution
                multivalued: true
                inlined: true
                inlined_as_list: true

            test_deviations:
                range: TestDeviation
                description: Deviations from the planned test protocol
                multivalued: true
                inlined: true
                inlined_as_list: true

            observation_codes:
                range: string
                description: Standardized fault, defect, observation, or diagnostic codes
                multivalued: true
                annotations:
                    sql_identifier: diag_test_observation_codes
                    owl.filler: sosa:hasResult

            observation_codes_value:
                range: string
                description: Value holder for observation codes

            observation_notes:
                range: string
                description: Human-readable notes about observations made during the test
                annotations:
                    sql_identifier: diag_test_observation_notes
                    owl.filler: dcterms:description

            observation_notes_value:
                range: string
                description: Value holder for observation notes

            test_comparison:
                range: TestComparison
                description: Comparison of the result against baselines, peers, or specifications
                inlined: true

            retest_required:
                range: boolean
                description: Whether the test result requires another test run
                annotations:
                    sql_identifier: diag_test_retest_required
                    owl.filler: schema:actionStatus

            retest_required_value:
                range: string
                description: Value holder for retest required flag

            inconclusive_reason:
                range: string
                description: Reason why the test could not produce a conclusive result
                annotations:
                    sql_identifier: diag_test_inconclusive_reason
                    owl.filler: dcterms:description

            inconclusive_reason_value:
                range: string
                description: Value holder for inconclusive reason

            calibration_traceability:
                range: CalibrationTraceability
                description: Calibration and equipment traceability supporting the test result
                inlined: true

            component_test_uncertainty_statements:
                range: UncertaintyStatement
                description: Optional uncertainty statements for component test results, measured values, thresholds, or test interpretations
                multivalued: true
                inlined: true
                inlined_as_list: true
                required: false
                annotations:
                    owl.filler: uq:uncertaintyStatement
                    sql_identifier: diag_test_uncertainty_statements

            component_test_metrological_traceability_statements:
                range: TraceabilityStatement
                description: Optional metrological traceability statements for component tests, methods, instruments, standards, calibrations, or reference materials
                multivalued: true
                inlined: true
                inlined_as_list: true
                required: false
                annotations:
                    owl.filler: mt:traceabilityStatement
                    sql_identifier: diag_test_metrological_traceability

            component_test_data_quality_assessments:
                range: DataQualityAssessment
                description: Optional data quality assessments for component test data, evidence, provenance, completeness, or representativeness
                multivalued: true
                inlined: true
                inlined_as_list: true
                required: false
                annotations:
                    owl.filler: dqf:dataQualityAssessment
                    sql_identifier: diag_test_data_quality_assessments

            testing_certificate:
                range: TestingCertificate
                description: Certificate(s) of Testing (CoT) attesting the test outcome - required evidence for ICT processes
                multivalued: true
                inlined: true
                inlined_as_list: true
                required: false
                annotations:
                    references: "CIRPASS; Battery Pass"
                    sql_identifier: diag_test_testing_certificate

    TestingCertificate:
        description: Certificate of Testing (CoT) - formal attestation of a test result linked to the diagnostic result
        class_uri: schema:Certification
        attributes:
            certificate_identifier:
                range: string
                description: Unique identifier or report ID of the testing certificate
                annotations:
                    sql_identifier: diag_cot_id
                    owl.filler: dcterms:identifier
                    references: "CIRPASS"

            certificate_identifier_value:
                range: string
                description: Value holder for certificate identifier

            issuing_body:
                range: string
                description: Organisation or accredited body that issued the certificate
                annotations:
                    sql_identifier: diag_cot_issuing_body
                    owl.filler: schema:issuedBy

            issuing_body_value:
                range: string
                description: Value holder for issuing body

            issue_date:
                range: date
                description: Date the certificate was issued
